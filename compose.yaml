services:
  jpsub-local:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: jpsub:local
    user: "${UID}:${GID}"
    environment:
      HF_HOME: /tmp/hf
      XDG_CACHE_HOME: /tmp/xdg
      TRANSFORMERS_CACHE: /tmp/hf/transformers
      HUGGINGFACE_HUB_CACHE: /tmp/hf/hub
      DEEPL_API_KEY: ${DEEPL_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ASR_BACKEND: local
      ANKI_CONNECT_ENABLED: "1"
      ANKI_CONNECT_HOST: host.docker.internal
      ANKI_CONNECT_PORT: "8765"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./output:/app/output
      - ./input:/app/input
      - ./artists_map.yaml:/app/artists_map.yaml:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./batch.txt:/app/batch.txt
      - ./.cache:/app/.cache
